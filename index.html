<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ege Başarı Kurs Merkezi</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Import map for Three.js and its dependencies -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
      }
    </script>
  </head>

  <body>
    <header id="header">Ege Başarı Kurs Merkezi</header>
    <div id="crosshair"></div>

    <!-- Mobile Controls Overlay (for movement and view rotation) -->
    <div id="mobile-controls">
      <div id="rotation-disk"></div>
      <div id="move-controls">
        <button id="move-up">↑</button>
        <button id="move-left">←</button>
        <button id="move-down">↓</button>
        <button id="move-right">→</button>
      </div>
    </div>

    <script type="module" src="3jsroom.js"></script>
  </body>
</html>
